<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">

    <h1>📝 Blog Dashboard</h1>

    <!-- FORM CARD -->
    <div class="form-card">
      <input type="hidden" id="blogId">

      <input type="text" id="title" placeholder="Enter blog title">

      <textarea id="content" placeholder="Write your blog..."></textarea>

      <button id="submitBtn" onclick="submitBlog()">Publish Blog</button>
      <button onclick="logout()">Logout</button>
    </div>

    <!-- BLOG LIST -->
    <div id="blogList" class="blog-grid"></div>

  </div>

  <script src="js/script.js"></script>
</body>
</html>
